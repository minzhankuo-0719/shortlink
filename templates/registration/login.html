{% extends "base.html" %}

{% block title %}登入 — ShortLink{% endblock %}

{% block content %}
  <h1 class="text-xl font-bold mb-4">登入</h1>
  {% if form.errors %}
    <p class="text-red-600 mb-3">帳號或密碼不正確，請再試一次。</p>
  {% endif %}
  <form method="post" class="space-y-4 max-w-sm">
    {% csrf_token %}
    <div>
      <label class="block text-sm mb-1" for="{{ form.username.id_for_label }}">帳號</label>
      {{ form.username }}
    </div>
    <div>
      <label class="block text-sm mb-1" for="{{ form.password.id_for_label }}">密碼</label>
      {{ form.password }}
    </div>
    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
      登入
    </button>
    <input type="hidden" name="next" value="{{ next }}">
  </form>
{% endblock %}
