{% load allauth %}
<p class="text-sm rounded px-3 py-2 mb-4
          {% if attrs.level == "error" %}text-red-700 bg-red-50 border border-red-200
          {% elif attrs.level == "warning" %}text-yellow-800 bg-yellow-50 border border-yellow-200
          {% else %}text-green-700 bg-green-50 border border-green-200{% endif %}">
    {% slot message %}
    {% endslot %}
</p>
