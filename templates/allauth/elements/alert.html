{% load allauth %}
<p class="text-sm rounded px-3 py-2 mb-4
          {% if attrs.level == "error" %}text-red-700 bg-red-50 border border-red-200 dark:text-red-300 dark:bg-red-900/30 dark:border-red-800
          {% elif attrs.level == "warning" %}text-yellow-800 bg-yellow-50 border border-yellow-200 dark:text-yellow-300 dark:bg-yellow-900/30 dark:border-yellow-800
          {% else %}text-green-700 bg-green-50 border border-green-200 dark:text-green-300 dark:bg-green-900/30 dark:border-green-800{% endif %}">
    {% slot message %}
    {% endslot %}
</p>
