{% extends "base.html" %}

{% block title %}Create Short Link — ShortLink{% endblock %}

{% block content %}
  <h1 class="text-xl font-bold mb-4">Create Short Link</h1>
  <form method="post" class="space-y-4 max-w-lg">
    {% csrf_token %}
    <div>
      <label class="block text-sm mb-1" for="{{ form.original_url.id_for_label }}">Original URL</label>
      {{ form.original_url }}
      {% if form.original_url.errors %}
        <p class="text-red-600 text-sm mt-1">{{ form.original_url.errors|join:", " }}</p>
      {% endif %}
    </div>
    <div>
      <label class="block text-sm mb-1" for="{{ form.title.id_for_label }}">Title (optional)</label>
      {{ form.title }}
    </div>
    <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded transition-all duration-150 hover:bg-blue-700 hover:shadow-lg">
      Create
    </button>
  </form>
{% endblock %}
