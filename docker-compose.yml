services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: shortlink
      POSTGRES_USER: shortlink
      POSTGRES_PASSWORD: shortlink
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shortlink"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine

  web:
    build: .
    # Runs the same prod image (gunicorn + WhiteNoise) Cloud Run will run, so
    # this is a real rehearsal of the deployment rather than just `runserver`.
    env_file: .env
    environment:
      DATABASE_URL: postgres://shortlink:shortlink@db:5432/shortlink
      REDIS_URL: redis://redis:6379
      ALLOWED_HOSTS: localhost,127.0.0.1
      CSRF_TRUSTED_ORIGINS: http://localhost:8000
    ports:
      - "8000:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
